services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Guatemala
    volumes:
      - ./config:/config
      - ./media/movies:/data/movies
      - ./media/shows:/data/tvshows
    ports:
      - "8096:8096"
    restart: unless-stopped
